openapi: 3.0.3
info:
  title: Streaming Platform API
  description: API для стриминговой платформы (пример)
  version: 1.0.0

paths:
  /channels:
    get:
      summary: Получить список каналов
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Список каналов
          content:
            application/json:
              schema:
                type: object
                properties:
                  channels:
                    type: array
                    items:
                      $ref: '#/components/schemas/Channel'
                  total:
                    type: integer

  /subscriptions:
    post:
      summary: Оформить подписку
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionRequest'
      responses:
        '201':
          description: Подписка создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'

components:
  schemas:
    Channel:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        category:
          type: string
        is_hd:
          type: boolean

    SubscriptionRequest:
      type: object
      required:
        - user_id
        - plan_id
      properties:
        user_id:
          type: string
        plan_id:
          type: string
        payment_method:
          type: string
          enum: [card, apple_pay, google_pay]

    Subscription:
      type: object
      properties:
        id:
          type: string
        user_id:
          type: string
        plan_id:
          type: string
        status:
          type: string
          enum: [active, cancelled, expired]
        start_date:
          type: string
          format: date-time
        end_date:
          type: string
          format: date-time
